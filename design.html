* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

#root { height:100%; width:100%; }
input, textarea, button, select { font-family:var(--font-body); outline:none; border:none; }
button { cursor:pointer; -webkit-appearance:none; }
button:active { transform:scale(0.97); }
::-webkit-scrollbar { display:none; }

@keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes slideDown { from{transform:translateY(-12px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes scaleIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes checkDraw { 0%{stroke-dashoffset:24} 100%{stroke-dashoffset:0} }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(212,87,42,0.4)} 50%{box-shadow:0 0 0 6px rgba(212,87,42,0)} }
@keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    } else {

    }
    setShowAddrForm(false); setNewAddrText(''); setNewAddrLabel('Home'); setEditingAddrId(null);
  };

  };

      const t = setTimeout(() => setOtpTimer(otpTimer - 1), 1000);

  }, [auth, otpTimer]);

  const doLogin = () => {

    btnOutline: { background:'transparent', border:'2px solid var(--grey-200)', color:'var(--text)' },
    input: { width:'100%', padding:'14px 16px', borderRadius:'var(--radius-sm)', border:'2px solid var(--grey-200)', fontSize:15, background:'var(--cream)', color:'var(--text)', minHeight:48, transition:'border 0.2s' },

            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google

          <button onClick={doLogin} style={{...S.btn,background:'#1877F2',color:'white',gap:10}}>

            Already have an account? <span style={{color:'var(--forest)',fontWeight:700,marginLeft:4}}>Log in</span>
          </button>
        </div>
      </div>

    if (auth === 'login') return (

          <button onClick={() => { if(regStep>1) setRegStep(1); else setAuth('welcome'); }} style={{background:'none',padding:8,marginLeft:-8,minHeight:44,minWidth:44,display:'flex',alignItems:'center'}}>{I.back}</button>

        <div style={{height:4,borderRadius:2,background:'var(--grey-200)',marginBottom:24,overflow:'hidden'}}>
          <div style={{height:'100%',borderRadius:2,background:'var(--forest)',width:regStep===1?'50%':'100%',transition:'width 0.5s cubic-bezier(0.4,0,0.2,1)'}}/>

        <div style={{animation:'fadeInUp 0.4s ease'}} key={regStep}>
          <h1 style={{fontFamily:'var(--font-display)',fontSize:28,color:'var(--slate-dark)',marginBottom:6}}>
            {regStep === 1 ? 'Create account' : 'Security'}

          <p style={{color:'var(--text-muted)',fontSize:14,marginBottom:28}}>Step {regStep} of 2</p>
          {regStep === 1 ? (

              <input style={S.input} placeholder="Full name" />

              />
            ))}
          </div>
          <button onClick={doLogin} disabled={otp.some(d=>!d)} style={{...S.btn,...S.btnEmber,width:'100%',opacity:otp.some(d=>!d)?0.5:1}}>Verify</button>

                  <label style={{fontSize:11,fontWeight:700,color:'var(--grey-500)',marginBottom:6,display:'block',textTransform:'uppercase',letterSpacing:0.5}}>Service area city</label>
                  <input style={{...S.input,marginBottom:10}} placeholder="e.g. Bucharest" value={wizardData.city} onChange={e => setWizardData(d=>({...d,city:e.target.value}))} />
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {['10km','25km','50km','Full county'].map(r => (
                      <Chip key={r} label={r} selected={wizardData.radius===r} onPress={() => setWizardData(d=>({...d,radius:r}))} />
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:20}}>
                  <label style={{fontSize:11,fontWeight:700,color:'var(--grey-500)',marginBottom:8,display:'block',textTransform:'uppercase',letterSpacing:0.5}}>Availability</label>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {['Weekdays','Weekends','Both','Flexible'].map(a => (
                      <Chip key={a} label={a} selected={wizardData.availability===a} onPress={() => setWizardData(d=>({...d,availability:a}))} />
                    ))}
                  </div>
                </div>
              </>)}

              {wizardStep === 3 && (<>
                <h3 style={{fontFamily:'var(--font-display)',fontSize:22,color:'var(--slate-dark)',marginBottom:4,fontWeight:700}}>Rate & Presentation</h3>
                <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:20}}>Tell clients how you charge and who you are.</p>
                <div style={{marginBottom:20}}>
                  <label style={{fontSize:11,fontWeight:700,color:'var(--grey-500)',marginBottom:8,display:'block',textTransform:'uppercase',letterSpacing:0.5}}>How do you charge?</label>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {['Per hour','Per day','Per sqm','Per project','Negotiable'].map(r => (
                      <Chip key={r} label={r} selected={wizardData.rateType===r} onPress={() => setWizardData(d=>({...d,rateType:r}))} />
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:20}}>
                  <label style={{fontSize:11,fontWeight:700,color:'var(--grey-500)',marginBottom:6,display:'block',textTransform:'uppercase',letterSpacing:0.5}}>Estimated rate (RON) — optional</label>
                  <input style={S.input} placeholder="e.g. 150" type="text" value={wizardData.rate} onChange={e => setWizardData(d=>({...d,rate:e.target.value}))} />
                </div>
                <div style={{marginBottom:20}}>
                  <label style={{fontSize:11,fontWeight:700,color:'var(--grey-500)',marginBottom:6,display:'block',textTransform:'uppercase',letterSpacing:0.5}}>Short bio</label>
                  <textarea maxLength={200} style={{...S.input,minHeight:90,resize:'none'}} placeholder="Describe your experience and approach..." value={wizardData.bio} onChange={e => setWizardData(d=>({...d,bio:e.target.value}))} />
                  <div style={{fontSize:11,color:'var(--grey-400)',textAlign:'right',marginTop:4}}>{wizardData.bio.length} / 200</div>
                </div>
                <div style={{marginBottom:20}}>
                  <label style={{fontSize:11,fontWeight:700,color:'var(--grey-500)',marginBottom:10,display:'block',textTransform:'uppercase',letterSpacing:0.5}}>Past work photos — optional</label>
                  <div style={{display:'flex',gap:10}}>
                    {[0,1,2].map(i => (
                      <button key={i} style={{width:90,height:90,borderRadius:'var(--radius-sm)',border:'2px dashed var(--grey-300)',background:'var(--grey-100)',display:'flex',alignItems:'center',justifyContent:'center',flex:1}}>
                        {I.camera}
                      </button>
                    ))}
                  </div>
                </div>
              </>)}

              {wizardStep === 4 && (<>
                <h3 style={{fontFamily:'var(--font-display)',fontSize:22,color:'var(--slate-dark)',marginBottom:4,fontWeight:700}}>Profile Preview</h3>
                <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:20}}>This is how you'll appear to clients.</p>
                <div style={{...S.card,margin:'0 0 16px',borderLeft:'4px solid var(--forest)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                    <Avatar init="JR" size={52} bg='var(--forest)' />
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800,fontSize:15,color:'var(--slate-dark)',marginBottom:2}}>Jordan Reed</div>
                      <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:4}}>{wizardData.title || 'Your professional title'}</div>
                      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                        {wizardData.availability && <span style={{...S.chip,background:'rgba(45,90,61,0.08)',color:'var(--forest)',fontSize:11,padding:'3px 8px'}}>{wizardData.availability}</span>}
                        {wizardData.certified && <span style={{display:'flex',alignItems:'center',gap:3,fontSize:11,color:'var(--forest)',fontWeight:700}}>{I.shield} Certified</span>}
                      </div>
                    </div>
                  </div>
                  {wizardData.bio && <p style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.5,marginBottom:12}}>{wizardData.bio}</p>}
                  <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
                    {wizardData.categories.slice(0,4).map(c => (
                      <span key={c} style={{...S.chip,background:'var(--grey-100)',color:'var(--grey-600)',fontSize:11,padding:'4px 10px'}}>{c}</span>
                    ))}
                    {wizardData.categories.length > 4 && <span style={{...S.chip,background:'var(--grey-100)',color:'var(--grey-400)',fontSize:11,padding:'4px 10px'}}>+{wizardData.categories.length-4} more</span>}
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:10,fontSize:12,color:'var(--grey-500)',paddingTop:10,borderTop:'1px solid var(--grey-200)'}}>
                    {wizardData.experience && <span style={{display:'flex',alignItems:'center',gap:3}}>{I.clock} {wizardData.experience} yrs</span>}
                    {wizardData.city && <span style={{display:'flex',alignItems:'center',gap:3}}>{I.mapPin} {wizardData.city}{wizardData.radius?` · ${wizardData.radius}`:''}</span>}
                    {wizardData.rateType && <span style={{display:'flex',alignItems:'center',gap:3}}>{I.dollar} {wizardData.rateType}{wizardData.rate?` · ${wizardData.rate} RON`:''}</span>}
                    {wizardData.workType==='team' && <span style={{display:'flex',alignItems:'center',gap:3}}>{I.users} With a team</span>}
                  </div>
                </div>
                <button onClick={() => setWizardStep(2)} style={{background:'none',color:'var(--forest)',fontSize:14,fontWeight:700,minHeight:44,display:'flex',alignItems:'center',gap:4,padding:'4px 0',marginBottom:4}}>
                  ← Edit details
                </button>
              </>)}

            </div>
          </div>
        )}
        {!wizardDone && (
          <div style={{padding:'12px 20px',paddingBottom:'max(var(--safe-bottom), 16px)',background:'var(--cream)',borderTop:'1px solid var(--grey-200)',display:'flex',gap:10}}>
            {wizardStep > 1 && <button onClick={() => setWizardStep(wizardStep-1)} style={{...S.btn,...S.btnOutline,flex:1}}>Back</button>}
            {wizardStep < 4 ? (
              <button onClick={() => setWizardStep(wizardStep+1)} style={{...S.btn,...S.btnForest,flex:2}}>Continue</button>
            ) : (
              <button onClick={publishProfile} style={{...S.btn,...S.btnEmber,flex:1}}>Publish Profile</button>
            )}
          </div>
        )}
      </div>
    );
  };

  /* ════════════════════════════════════════════
     MAIN RENDER
     ════════════════════════════════════════════ */
  if (!loggedIn) return renderAuth();

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--sand)'}}>
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {selJob && renderJobDetail()}
        {selMyJob && renderMyJobDetail()}
        {!selJob && !selMyJob && tab === 'home' && renderHome()}
        {!selJob && !selMyJob && tab === 'jobs' && renderMyJobs()}
        {!selJob && !selMyJob && tab === 'messages' && renderMessages()}
        {!selJob && !selMyJob && tab === 'profile' && renderProfile()}
      </div>
      {!selJob && !selMyJob && !selChat && renderNav()}
      {showPost && renderPostJob()}
      {showLocModal && renderLocationModal()}
      {showAddressesScreen && renderAddressesScreen()}
      {showContractorWizard && renderContractorWizard()}
      {showRoleSheet && renderRoleSheet()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
